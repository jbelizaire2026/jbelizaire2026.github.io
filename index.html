/* Shared helpers for the Reclaim website UI kit. */
(function () {
const { useState } = React;

/** Inline a brand icon from window.RC_ICONS, sized by font-size. */
function Icon({ name, size = 24, className = "", style = {} }) {
  const svg = (window.RC_ICONS || {})[name] || "";
  return (
    <span
      className={"rc-ic " + className}
      style={{ display: "inline-flex", fontSize: size, lineHeight: 0, ...style }}
      dangerouslySetInnerHTML={{ __html: svg }}
    />
  );
}

/** Reclaim stacked lockup. `variant` = "dark" (white mark, for dark bg)
 *  or "light" (grey mark, for light bg). */
function Logo({ variant = "light", height = 56 }) {
  const src =
    variant === "dark"
      ? "assets/logo/reclaim-logo-white.png"
      : "assets/logo/reclaim-logo.png";
  return <img src={src} alt="Reclaim Construction" style={{ height, display: "block" }} />;
}

window.Icon = Icon;
window.Logo = Logo;
})();

</script>

<script type="text/babel" data-src="Sections2.js">
/* Investors, Homeowners, Aging-in-place — service sections with tabs */
(function () {
const { Button: SButton, Card: SCard, Tabs: STabs } = window.ReclaimConstructionDesignSystem_813411;
const { Icon: SIcon } = window;
const { useState: useS2 } = React;

function ServiceIntro({ eyebrow, title, body }) {
  return (
    <div className="center mw-lg mx-auto mb-20">
      <p className="eyebrow">{eyebrow}</p>
      <h2 className="h2">{title}</h2>
      <p className="lede muted mt-6">{body}</p>
    </div>
  );
}

/* Draggable before/after reveal slider. AFTER is the base; BEFORE is clipped from the left. */
function BeforeAfter({ before, after, alt }) {
  const [pos, setPos] = useS2(50);
  const wrap = React.useRef(null);
  const drag = React.useRef(false);

  const moveTo = (clientX) => {
    const el = wrap.current;
    if (!el) return;
    const r = el.getBoundingClientRect();
    const p = ((clientX - r.left) / r.width) * 100;
    setPos(Math.max(0, Math.min(100, p)));
  };
  const onDown = (e) => { drag.current = true; e.currentTarget.setPointerCapture(e.pointerId); moveTo(e.clientX); };
  const onMove = (e) => { if (drag.current) moveTo(e.clientX); };
  const onUp = () => { drag.current = false; };
  const onKey = (e) => {
    if (e.key === "ArrowLeft") { e.preventDefault(); setPos((p) => Math.max(0, p - 4)); }
    else if (e.key === "ArrowRight") { e.preventDefault(); setPos((p) => Math.min(100, p + 4)); }
  };

  return (
    <div
      ref={wrap}
      onPointerDown={onDown}
      onPointerMove={onMove}
      onPointerUp={onUp}
      onPointerCancel={onUp}
      style={{ position: "relative", touchAction: "none", userSelect: "none", cursor: "ew-resize" }}
    >
      <img className="cover aspect-square" src={after} alt={alt} draggable={false} style={{ display: "block" }} />
      <div style={{ position: "absolute", inset: 0, clipPath: `inset(0 ${100 - pos}% 0 0)` }}>
        <img className="cover" src={before} alt="" draggable={false} style={{ position: "absolute", inset: 0 }} />
      </div>
      <div style={{ position: "absolute", top: 0, bottom: 0, left: `${pos}%`, transform: "translateX(-50%)", width: 2, background: "rgba(255,255,255,.92)", boxShadow: "0 0 0 1px rgba(0,0,0,.18)", pointerEvents: "none" }}></div>
      <button
        type="button"
        aria-label="Drag to compare before and after"
        onKeyDown={onKey}
        style={{
          position: "absolute", top: "50%", left: `${pos}%`, transform: "translate(-50%,-50%)",
          width: 46, height: 46, borderRadius: "50%", border: "2px solid rgba(255,255,255,.95)",
          background: "rgba(17,17,17,.5)", color: "#fff", padding: 0,
          display: "flex", alignItems: "center", justifyContent: "center", gap: 3,
          cursor: "ew-resize", boxShadow: "0 2px 12px rgba(0,0,0,.4)", touchAction: "none",
        }}
      >
        <span aria-hidden="true" style={{ fontSize: 16, lineHeight: 1, fontWeight: 700 }}>‹</span>
        <span aria-hidden="true" style={{ fontSize: 16, lineHeight: 1, fontWeight: 700 }}>›</span>
      </button>
    </div>
  );
}

/* Vertical tab list with a swapping image — used by Investors & Aging-in-place. */
function SideTabs({ tabs }) {
  const [active, setActive] = useS2(0);
  return (
    <div className="grid cols-2 items-center gap-20">
      <div>
        {tabs.map((t, i) => (
          <button
            key={i}
            onClick={() => setActive(i)}
            style={{
              display: "block", width: "100%", textAlign: "left", cursor: "pointer",
              background: "transparent", border: "none",
              borderBottom: "1px solid var(--scheme-border)", padding: "1.5rem 0",
              opacity: active === i ? 1 : 0.4, transition: "opacity .2s ease",
            }}
          >
            <h4 className="h4">{t.title}</h4>
            {active === i && <p className="body muted" style={{ marginTop: ".75rem" }}>{t.body}</p>}
          </button>
        ))}
      </div>
      <div className="rounded-img" key={active} style={{ animation: "rc-tab-fade .4s ease" }}>
        {tabs[active].before
          ? <BeforeAfter before={tabs[active].before} after={tabs[active].after} alt={tabs[active].title} />
          : <img className="cover aspect-square" src={tabs[active].img} alt={tabs[active].title} />}
      </div>
    </div>
  );
}

function Investors() {
  const tabs = [
    { title: "BRRRR projects", body: "We manage the full rehab from acquisition to rental. Scope, budget, timeline, and draw coordination handled by someone who understands your exit strategy.", before: "assets/images/investor-brrrr-before.jpg", after: "assets/images/investor-brrrr-after.jpg" },
    { title: "Fix-and-flips", body: "Speed and quality matter equally. We deliver market-ready homes on schedule without cutting corners that hurt your sale price.", before: "assets/images/investor-flip-before.jpg", after: "assets/images/investor-flip-after.jpg" },
    { title: "Rental rehabs", body: "Durable, tenant-friendly finishes that hold up and keep maintenance costs down. That's how we build rental income.", before: "assets/images/investor-rental-before.jpg", after: "assets/images/investor-rental-after.jpg" },
  ];
  return (
    <section className="section scheme-2" id="investors">
      <div className="container">
        <ServiceIntro eyebrow="Investors" title="Rental rehabs that maximize returns"
          body="BRRRR projects, fix-and-flips, and rental rehabs need precision. We handle scope development, draw coordination, and timeline management so you can focus on the numbers." />
        <SideTabs tabs={tabs} />
      </div>
    </section>
  );
}

function Homeowners() {
  const items = [
    { value: "k", label: "Kitchens", content: <HomeownerCard eyebrow="Kitchen" title="Where life happens" body="A well-designed kitchen brings the family together. We build kitchens that function beautifully and last for decades." img="assets/images/home-kitchen.jpg" /> },
    { value: "b", label: "Bathrooms", content: <HomeownerCard eyebrow="Bathroom" title="A daily retreat" body="Better storage, better light, and finishes that hold up to real life. Bathrooms you actually enjoy using." img="assets/images/home-bathroom.jpg" /> },
    { value: "s", label: "Basements", content: <HomeownerCard eyebrow="Basement" title="Room to grow" body="Turn unused square footage into a real part of your home — dry, warm, and finished right." img="assets/images/home-basement.jpg" /> },
  ];
  return (
    <section className="section scheme-3" id="homeowners">
      <div className="container">
        <ServiceIntro eyebrow="Homeowners" title="Spaces that transform how you live"
          body="A kitchen that works. A bathroom that feels like a retreat. A basement that becomes part of your home. We build spaces that improve your daily life." />
        <div style={{ display: "flex", justifyContent: "center" }}>
          <div style={{ width: "100%" }}>
            <STabs variant="pill" items={items} />
          </div>
        </div>
      </div>
    </section>
  );
}

function HomeownerCard({ eyebrow, title, body, img }) {
  return (
    <SCard>
      <div className="grid cols-2 items-center" style={{ gap: 0 }}>
        <div style={{ padding: "3rem" }}>
          <p className="eyebrow">{eyebrow}</p>
          <h3 className="h3 mb-12" style={{ marginBottom: "1rem" }}>{title}</h3>
          <p className="body muted">{body}</p>
          <div className="btn-row mt-8">
            <SButton variant="secondary">Schedule</SButton>
            <SButton variant="link" iconRight={<SIcon name="chevronRight" size={18} />}>View work</SButton>
          </div>
        </div>
        <div className="aspect-square"><img className="cover" src={img} alt={title} /></div>
      </div>
    </SCard>
  );
}

function AgingInPlace() {
  const tabs = [
    { title: "Walk-in showers", body: "Curbless, slip-resistant showers designed for safe, independent bathing for years to come.", img: "assets/images/aging-walk-in-shower.jpg" },
    { title: "Grab bars & safety", body: "Discreet, sturdy support placed exactly where it's needed — bathrooms, hallways, and entries.", img: "assets/images/aging-grab-bars.jpg" },
    { title: "Ramps & doorways", body: "Wider doorways and gentle ramps that keep every room reachable, with dignity.", img: "assets/images/aging-ramp.webp" },
  ];
  return (
    <section className="section scheme-2" id="aging-in-place">
      <div className="container">
        <ServiceIntro eyebrow="Aging in place" title="Modifications that preserve independence"
          body="Walk-in showers, grab bars, ramps, and wider doorways — thoughtful changes that let people stay safely in the home they love." />
        <SideTabs tabs={tabs} />
      </div>
    </section>
  );
}

window.Investors = Investors;
window.Homeowners = Homeowners;
window.AgingInPlace = AgingInPlace;
})();

</script>
